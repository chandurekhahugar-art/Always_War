<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Adventure War — HTML5 Canvas Game</title>
  <style>
    :root{--bg:#0b1020;--panel:#0f1724;--accent:#ff6b6b;--muted:#9aa4b2}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Arial;color:#e6eef6;background:linear-gradient(180deg,#031026 0%, #071428 60%);}
    .wrap{display:flex;align-items:center;justify-content:center;height:100%;}
    .ui {position:fixed;left:20px;top:20px;z-index:50;color:#dbe7ff}
    .panel{background:rgba(8,12,20,0.6);backdrop-filter:blur(6px);padding:12px;border-radius:12px;box-shadow:0 6px 30px rgba(3,8,20,0.6)}
    button{appearance:none;border:0;padding:10px 14px;border-radius:8px;background:linear-gradient(180deg,#1f2a44,#111827);color:#eaf2ff;cursor:pointer;font-weight:600}
    button.primary{background:linear-gradient(180deg,#0077ff,#0056c7)}
    #hud{position:fixed;right:20px;top:20px;text-align:right;z-index:50}
    canvas{border-radius:12px;box-shadow:0 18px 60px rgba(0,0,0,0.6);max-width:95vw;}
    .center-screen{display:flex;flex-direction:column;align-items:center;gap:12px}
    h1{margin:0;font-size:20px}
    p.small{margin:0;font-size:12px;color:var(--muted)}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    footer{position:fixed;left:0;right:0;bottom:10px;text-align:center;color:rgba(255,255,255,0.35);font-size:12px}
  </style>
</head>
<body>
  <div class="ui panel">
    <div class="center-screen">
      <h1>Adventure War — Demo</h1>
      <p class="small">Top-down adventure shooter. Survive waves, defeat bosses, upgrade weapons.</p>
      <div style="height:8px"></div>
      <div class="controls">
        <button id="startBtn" class="primary">Start Game</button>
        <button id="restartBtn">Restart</button>
        <button id="muteBtn">Mute</button>
        <button id="pauseBtn">Pause</button>
      </div>
    </div>
  </div>

  <div id="hud" class="panel">
    <div id="status">Status: <strong id="statText">Idle</strong></div>
    <div>Level: <strong id="levelText">0</strong></div>
    <div>Score: <strong id="scoreText">0</strong></div>
  </div>

  <div class="wrap">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
  </div>

  <footer>Controls — Move: WASD / Arrow keys • Shoot: Mouse Click • Melee: Space • Pause: P</footer>

<script>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = canvas.width, H = canvas.height;

const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const muteBtn = document.getElementById('muteBtn');
const pauseBtn = document.getElementById('pauseBtn');
const statText = document.getElementById('statText');
const levelText = document.getElementById('levelText');
const scoreText = document.getElementById('scoreText');

let running = false;
let paused = false;
let muted = false;
let lastTime = 0;
let dt = 0;
let mouse = {x: W/2, y: H/2, down:false};
let keys = {};
let particles = [];
let bullets = [];
let enemies = [];
let level = 0;
let score = 0;
let waveEnemies = 0;

const player = {
  x: W/2, y: H/2, r:18,
  speed: 260, hp: 100, maxHp:100,
  meleeCooldown: 0, rangedCooldown:0
};

let shake = 0;

function rand(min,max){return Math.random()*(max-min)+min}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq, time=0.08, type='sine', vol=0.07){if(muted) return; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type=type; o.frequency.value=freq; g.gain.value=vol; o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+time); o.stop(audioCtx.currentTime+time+0.02);}


window.addEventListener('resize', ()=>{ /* keep canvas fixed size for consistent gameplay */ });
canvas.addEventListener('mousemove', e=>{const rect=canvas.getBoundingClientRect(); mouse.x=(e.clientX-rect.left)*(canvas.width/rect.width); mouse.y=(e.clientY-rect.top)*(canvas.height/rect.height);});
canvas.addEventListener('mousedown', ()=>mouse.down=true);
canvas.addEventListener('mouseup', ()=>mouse.down=false);
window.addEventListener('keydown', e=>{keys[e.key.toLowerCase()]=true; if(e.key===' '){e.preventDefault()} if(e.key==='p'){
  paused = !paused;

  if (paused) {
    statText.textContent = 'Paused';
    pauseBtn.textContent = 'Resume';
  } else {
    statText.textContent = 'Playing';
    pauseBtn.textContent = 'Pause';
  }
}});
window.addEventListener('keyup', e=>{keys[e.key.toLowerCase()]=false});

startBtn.onclick = ()=>{ if(!running) startGame(); }
restartBtn.onclick = ()=>{ resetGame(); startGame(); }
muteBtn.onclick = ()=>{ muted = !muted; muteBtn.textContent = muted? 'Unmute':'Mute'; }

function startGame(){ resetGame(); running=true; paused=false; statText.textContent='Playing'; requestAnimationFrame(loop); }

function resetGame(){ 
  enemies.length=0; bullets.length=0; particles.length=0;
  level=1; score=0; player.x=W/2; player.y=H/2; player.hp=player.maxHp; player.meleeCooldown=0; player.rangedCooldown=0; waveEnemies=0; statText.textContent='Ready'; levelText.textContent=level; scoreText.textContent=score;
}

pauseBtn.onclick = () => {
  if (!running) return;

  paused = !paused;

  if (paused) {
    statText.textContent = 'Paused';
    pauseBtn.textContent = 'Resume';
  } else {
    statText.textContent = 'Playing';
    pauseBtn.textContent = 'Pause';
  }
};

function spawnWave(){
  const count = 3 + Math.floor(level * 1.5);
  waveEnemies = count;
  for(let i=0;i<count;i++){
    spawnEnemy();
  }
  if(level%5===0){ spawnBoss(); }
}

function spawnEnemy(){
  const side = Math.floor(rand(0,4));
  let x=0,y=0;
  switch(side){
    case 0: x = rand(-50, -10); y = rand(0, H); break;
    case 1: x = rand(W+10, W+50); y = rand(0, H); break;
    case 2: x = rand(0,W); y = rand(-50,-10); break;
    default: x = rand(0,W); y = rand(H+10,H+50); break;
  }
  enemies.push({x,y,r:14,spd:rand(40,90)+level*4,hp:10+Math.floor(level*2),type:'grunt'});
}

function spawnBoss(){
  enemies.push({x:rand(100,W-100),y:rand(100,H-100),r:40,spd:40,hp:150+level*40,type:'boss',timer:0});
}

function shootBullet(x,y,tx,ty,owner='player'){ const ang=Math.atan2(ty-y,tx-x); bullets.push({x,y,vx:Math.cos(ang)*560,vy:Math.sin(ang)*560,r:5,owner}); beep(1200,0.06,'sine'); }

function meleeHit(){ 
  const range = 46;
  player.meleeCooldown = 0.5;
  for(const e of enemies){
    const dx=e.x-player.x, dy=e.y-player.y, d=Math.hypot(dx,dy);
    if(d<range+e.r){ e.hp -= 20; particles.push(...particleBurst(e.x,e.y,8)); if(e.hp<=0){ killEnemy(e); } }
  }
  shake = 6; beep(400,0.06,'square');
}

function killEnemy(e){ score += (e.type==='boss'?500:50); scoreText.textContent=score; spawnParticles(e.x,e.y, Math.min(30, 10 + Math.floor(e.r))); enemies.splice(enemies.indexOf(e),1); waveEnemies--; }

function spawnParticles(x,y,n){ for(let i=0;i<n;i++) particles.push({x,y,vx:rand(-200,200),vy:rand(-200,200),life:rand(0.4,1.2),r:rand(1,3)}) }
function particleBurst(x,y,n){ const arr=[]; for(let i=0;i<n;i++) arr.push({x,y,vx:rand(-120,120),vy:rand(-120,120),life:rand(0.5,1.0),r:rand(1,3)}); return arr }

function loop(ts){ if(!running) return; if(paused){ draw(); requestAnimationFrame(loop); return; } dt = Math.min(0.05,(ts - lastTime)/1000 || 0); lastTime = ts; update(dt); draw(); requestAnimationFrame(loop); if (paused) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.font = '40px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W / 2, H / 2);
}}

function update(dt){ 
  let dx=0, dy=0;
  if(keys['w'] || keys['arrowup']) dy -= 1;
  if(keys['s'] || keys['arrowdown']) dy += 1;
  if(keys['a'] || keys['arrowleft']) dx -= 1;
  if(keys['d'] || keys['arrowright']) dx += 1;
  const len = Math.hypot(dx,dy) || 1; player.x += (dx/len)*player.speed*dt; player.y += (dy/len)*player.speed*dt;
  player.x = clamp(player.x, 20, W-20); player.y = clamp(player.y, 20, H-20);
  if(player.meleeCooldown>0) player.meleeCooldown = Math.max(0, player.meleeCooldown - dt);
  if(player.rangedCooldown>0) player.rangedCooldown = Math.max(0, player.rangedCooldown - dt);

  if(mouse.down && player.rangedCooldown===0){ shootBullet(player.x,player.y,mouse.x,mouse.y); player.rangedCooldown = 0.14; }
  if(keys[' ']){ if(player.meleeCooldown===0){ meleeHit(); }}

  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.x+=b.vx*dt; b.y+=b.vy*dt; // check bounds
    if(b.x<-50||b.x>W+50||b.y<-50||b.y>H+50){ bullets.splice(i,1); continue; }
    if(b.owner==='player'){
      for(const e of enemies){ const d=Math.hypot(e.x-b.x,e.y-b.y); if(d<e.r+b.r){ e.hp -= 10; bullets.splice(i,1); spawnParticles(b.x,b.y,4); if(e.hp<=0){ killEnemy(e); } break; } }
    }
  }

  for(const e of enemies){ if(e.type==='boss'){ e.timer += dt; if(e.timer>1.2){ // boss special: fires projectile
      e.timer = 0; shootBullet(e.x,e.y,player.x,player.y,'enemy'); }
    }
    const ang = Math.atan2(player.y - e.y, player.x - e.x); e.x += Math.cos(ang)*e.spd*dt; e.y += Math.sin(ang)*e.spd*dt;

    const d = Math.hypot(player.x - e.x, player.y - e.y);
    if(d < e.r + player.r){ 
      player.hp -= 20*dt; shake = 3; if(player.hp<=0){ player.hp = 0; gameOver(); }
    }
  }

  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; if(b.owner==='enemy'){ if(Math.hypot(b.x-player.x,b.y-player.y) < player.r + b.r){ player.hp -= 12; bullets.splice(i,1); spawnParticles(player.x,player.y,6); if(player.hp<=0){ gameOver(); } } } }

  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 180*dt; p.life -= dt; if(p.life<=0) particles.splice(i,1); }

  if(enemies.length===0 && waveEnemies<=0){ level++; levelText.textContent = level; if(level>8){ victory(); } else { spawnWave(); } }

  shake = Math.max(0, shake - dt*8);
}

function gameOver(){ running=false; statText.textContent='Game Over'; showEndScreen(false); beep(200,0.4,'sawtooth'); }
function victory(){ running=false; statText.textContent='Victory'; showEndScreen(true); beep(1200,0.8,'triangle'); }

function showEndScreen(won){ 
  const overlay = document.createElement('div'); overlay.style.position='fixed'; overlay.style.left=0; overlay.style.top=0; overlay.style.right=0; overlay.style.bottom=0; overlay.style.display='flex'; overlay.style.alignItems='center'; overlay.style.justifyContent='center'; overlay.style.zIndex=200; overlay.style.backdropFilter='blur(4px)';
  overlay.innerHTML = `<div style="background:rgba(5,10,20,0.82);color:#eef6ff;padding:28px;border-radius:16px;text-align:center;max-width:600px;box-shadow:0 12px 40px rgba(0,0,0,0.6)">
    <h2 style='margin:0 0 8px'>${won? 'LEVEL COMPLETE! 🎉':'GAME OVER'}</h2>
    <p style='margin:4px 0 12px;color:#b8c6d8'>Score: <strong>${score}</strong> • Level reached: <strong>${level}</strong></p>
    <div style='display:flex;gap:10px;justify-content:center'>
      <button id='tryAgain' style='padding:10px 14px;border-radius:8px'>Restart</button>
      <button id='toMenu' style='padding:10px 14px;border-radius:8px'>Main Menu</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('tryAgain').onclick = ()=>{ document.body.removeChild(overlay); resetGame(); startGame(); };
  document.getElementById('toMenu').onclick = ()=>{ document.body.removeChild(overlay); resetGame(); statText.textContent='Idle'; }
}

function draw(){ ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(rand(-shake,shake), rand(-shake,shake));
  const grd = ctx.createLinearGradient(0,0,0,H); grd.addColorStop(0,'#071427'); grd.addColorStop(1,'#031025'); ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
  drawStars();

  for(const b of bullets){ ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle = b.owner==='player'? '#ffd98a':'#ff9ea1'; ctx.fill(); }

  for(const e of enemies){ ctx.save(); ctx.translate(e.x,e.y);
    if(e.type==='boss'){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fillStyle='#7b2cbf'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=2; ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(-e.r, -e.r); ctx.lineTo(e.r,0); ctx.lineTo(-e.r,e.r); ctx.closePath(); ctx.fillStyle='#ff7676'; ctx.fill();
    }
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-e.r, -e.r-10, e.r*2,6);
    ctx.fillStyle='#73ff9e'; ctx.fillRect(-e.r, -e.r-10, (e.hp/Math.max(1, (e.type==='boss'?150:10)+level*2))*(e.r*2),6);
    ctx.restore(); }

  ctx.save(); ctx.translate(player.x,player.y);
  const ang = Math.atan2(mouse.y-player.y, mouse.x-player.x);
  ctx.rotate(ang);
  ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(-16,12); ctx.lineTo(-8,0); ctx.lineTo(-16,-12); ctx.closePath();
  ctx.fillStyle = '#a8d0e6'; ctx.fill();
  ctx.fillStyle = '#2b2d42'; ctx.fillRect(0,-6,20,12);
  ctx.restore();

  const barW = 240; const barH = 16; const px = 20; const py = H - barH - 20;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(px-4, py-4, barW+8, barH+8);
  ctx.fillStyle='#e74c3c'; ctx.fillRect(px,py,barW*(player.hp/player.maxHp),barH);
  ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.strokeRect(px,py,barW,barH);
  ctx.fillStyle='#fff'; ctx.font='14px system-ui'; ctx.fillText(`HP: ${Math.round(player.hp)}/${player.maxHp}`, px, py-10);

  for(const p of particles){ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.fill(); }

  ctx.restore();
}

function drawStars(){ 
  ctx.fillStyle='rgba(255,255,255,0.02)';
  for(let i=0;i<60;i++){ const x=(i*73)%W + 12; const y=(i*43)%H + 8; ctx.fillRect(x,y,1,1); }
}

statText.textContent = 'Idle'; levelText.textContent = level; scoreText.textContent = score;

(function idleAnimation(){ let t=0; function f(ts){ if(running) return; t += 0.016; // animate some moving shapes
    ctx.clearRect(0,0,W,H); const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#071427'); g.addColorStop(1,'#031025'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(255,255,255,0.02)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#9fbcd7'; ctx.font='40px system-ui'; ctx.fillText('Adventure War', W/2-150 + Math.sin(t)*6, H/2-10);
    requestAnimationFrame(f);
  } requestAnimationFrame(f);
})();

window.addEventListener('pointerdown', ()=>{ if(audioCtx.state==='suspended') audioCtx.resume(); }, {once:true});

</script>
</body>
</html>
